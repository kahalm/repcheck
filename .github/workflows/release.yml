name: Release

# Bei einem Git-Tag wie `v1.3.1` ein GitHub Release anlegen und die
# Extension-ZIP anhaengen. Wenn die AMO-Repo-Secrets gesetzt sind
# (`AMO_API_KEY` + `AMO_API_SECRET`), wird die neue Version parallel beim
# OEFFENTLICHEN Mozilla-AMO-Listing eingereicht (--channel=listed → Review).
#
# Hinweise zum listed-Channel:
# - Das AMO-Listing muss bereits existieren (einmalig im Dev Hub angelegt,
#   inkl. Beschreibung/Screenshots/Kategorien); die API laedt nur neue
#   Versionen eines bestehenden Listings hoch.
# - listed erzeugt KEINE herunterladbare .xpi fuers GitHub-Release — die
#   Distribution laeuft ueber addons.mozilla.org nach Freigabe.
# - --approval-timeout=0: nach dem Upload sofort weiter, nicht auf das
#   (asynchrone) Review-Ergebnis warten.
#
# Setup-Hinweis: Tag bauen mit
#   git tag v1.3.1 && git push origin v1.3.1
# AMO-Keys generierst du unter:
#   https://addons.mozilla.org/developers/addon/api/key/
# und legst sie unter "Settings → Secrets → Actions" als
# AMO_API_KEY + AMO_API_SECRET an.
#
# Chrome Web Store (analog): wenn die Secrets CWS_CLIENT_ID, CWS_CLIENT_SECRET,
# CWS_REFRESH_TOKEN und CWS_APP_ID gesetzt sind, wird dieselbe ZIP per
# Chrome-Web-Store-Publish-API hochgeladen und zur Veroeffentlichung
# eingereicht. Den refresh_token erzeugst du einmalig lokal mit
#   node extension/get-cws-refresh-token.mjs
# (siehe Skript-Kopf). CWS erlaubt nur EINE Version gleichzeitig im Review —
# haengt noch eine, schlaegt der Step (nur als Warnung) fehl.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.3.1)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build (unsigned)
        run: |
          cd extension
          npx --yes web-ext@latest build --config=web-ext-config.cjs --overwrite-dest

      - name: Submit to Firefox AMO listing (if secrets configured)
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          if [ -z "$AMO_API_KEY" ] || [ -z "$AMO_API_SECRET" ]; then
            echo "AMO secrets not set — skipping AMO submission"
            exit 0
          fi
          cd extension
          npx --yes web-ext@latest sign \
            --config=web-ext-config.cjs \
            --channel=listed \
            --approval-timeout=0 \
            --api-key="$AMO_API_KEY" \
            --api-secret="$AMO_API_SECRET" || \
            echo "::warning::AMO submission failed — continuing release with unsigned ZIP only"

      - name: Submit to Chrome Web Store (if secrets configured)
        # Direkt gegen die Chrome Web Store API v1.1 statt der
        # chrome-webstore-upload-cli — deren Flags/Env-Vars/Pflichtfelder haben
        # sich zwischen Major-Versionen mehrfach geaendert (v4 verlangte zuletzt
        # ein "publisherId"). curl+jq sind auf ubuntu-latest vorhanden.
        # Ablauf: OAuth-Refresh → Upload (PUT) → Publish (POST). Fehler sind
        # weiche Warnungen (z. B. wenn schon eine Version im Review haengt).
        env:
          EXTENSION_ID: ${{ secrets.CWS_APP_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          if [ -z "$CLIENT_ID" ] || [ -z "$CLIENT_SECRET" ] || \
             [ -z "$REFRESH_TOKEN" ] || [ -z "$EXTENSION_ID" ]; then
            echo "CWS secrets not set — skipping Chrome Web Store submission"
            exit 0
          fi
          ZIP="$(ls -1 extension/web-ext-artifacts/*.zip | head -n1)"
          echo "Uploading $ZIP to Chrome Web Store"
          ACCESS_TOKEN=$(curl -sS -X POST https://oauth2.googleapis.com/token \
            -d "client_id=$CLIENT_ID" -d "client_secret=$CLIENT_SECRET" \
            -d "refresh_token=$REFRESH_TOKEN" -d "grant_type=refresh_token" \
            | jq -r '.access_token // empty')
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::warning::CWS: OAuth-Refresh fehlgeschlagen — Chrome uebersprungen"
            exit 0
          fi
          UPLOAD=$(curl -sS -X PUT -T "$ZIP" \
            -H "Authorization: Bearer $ACCESS_TOKEN" -H "x-goog-api-version: 2" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$EXTENSION_ID?uploadType=media")
          echo "Upload-Antwort: $UPLOAD"
          if [ "$(echo "$UPLOAD" | jq -r '.uploadState // empty')" != "SUCCESS" ]; then
            echo "::warning::CWS-Upload nicht SUCCESS — Publish uebersprungen"
            exit 0
          fi
          PUBLISH=$(curl -sS -X POST -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$EXTENSION_ID/publish")
          echo "Publish-Antwort: $PUBLISH"
          if echo "$PUBLISH" | jq -e '.status | index("OK")' >/dev/null 2>&1; then
            echo "Chrome Web Store: Version eingereicht/veroeffentlicht."
          else
            echo "::warning::CWS-Publish nicht OK (evtl. noch im Review): $PUBLISH"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            extension/web-ext-artifacts/*.zip
            extension/web-ext-artifacts/*.xpi
          generate_release_notes: true
          fail_on_unmatched_files: false
